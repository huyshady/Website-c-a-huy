<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghi chú của tôi</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    color:#007AFF;
}

textarea{
    width:100%;
    height:300px;
    font-size:18px;
    padding:10px;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    background:#007AFF;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h1>Ghi chú</h1>

<textarea id="note" placeholder="Hãy viết điều bạn muốn..."></textarea>

<br>

<button onclick="saveNote()">Lưu</button>

<script>
const note = document.getElementById("note");

note.value = localStorage.getItem("myNote") || "";

function saveNote(){
    localStorage.setItem("myNote", note.value);
    alert("Đã lưu!");
}
</script>

</body>
</html>
