<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi chú</title>

    <style>
        html {
            height: 100vh;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            color: white;
            /* Nền màu cam tối huyền bí */
            background: radial-gradient(circle at center, #2c1605 0%, #0f0701 100%);
            
            /* Căn giữa nội dung ghi chú */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            position: relative;
        }

        @keyframes rainbowBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(255, 149, 0, 0.4);
            font-size: 2.5rem;
            margin-bottom: 20px;
            z-index: 10; /* Chữ tiêu đề nằm trên cùng */
        }

        /* Khung ghi chú (Lớp viền cầu vồng nằm dưới sao băng) */
        .note {
            max-width: 800px;
            width: 85%;
            position: relative;
            z-index: 4; /* Nằm dưới sao băng (z-index: 5) */
            border-radius: 16px; 
            padding: 4px; /* Độ dày của viền cầu vồng */
            
            background: linear-gradient(
                45deg, 
                #ff3b30, #ff9500, #ffcc00, #4cd964, #5ac8fa, #007aff, #5856d6, #ff2d55
            );
            background-size: 400% 400%;
            animation: rainbowBorder 10s ease infinite;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        /* Lớp nội dung chứa chữ (Nằm TRÊN CÙNG để đè lên sao băng) */
        .note-content {
            position: relative;
            z-index: 10; /* Cao nhất, đè lên sao băng (z-index: 5) để chữ không bị che khuất */
            background: rgba(20, 10, 5, 0.88); /* Nền tối mịn màng giúp đọc chữ rất rõ */
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 12px; 
            color: white;
        }

        .note h2 {
            color: #ff9500;
            margin-top: 0;
        }

        .note p {
            line-height: 1.8;
            font-size: 1.1rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* Bông tuyết lấp lánh nền */
        .snowflake {
            position: absolute;
            color: #ffffff;
            font-size: 10px;
            user-select: none;
            pointer-events: none;
            animation: twinkleSnow 1.5s infinite alternate ease-in-out;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff9500;
            z-index: 1; /* Nằm dưới cùng */
        }

        @keyframes twinkleSnow {
            0% { opacity: 0.2; transform: scale(0.6) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.4) rotate(45deg); }
        }

        /* Khung chứa sao băng nằm ở lớp giữa */
        #shooting-stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5; /* Nằm giữa viền ghi chú (4) và chữ ghi chú (10) */
        }

        /* Thân sao băng */
        .shooting-star {
            position: absolute;
            width: 120px;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,1), rgba(255,255,255,0));
            transform: rotate(-45deg); 
            opacity: 0;
            animation: shootDownLeft linear forwards;
        }

        @keyframes shootDownLeft {
            0% {
                transform: translate(0, 0) rotate(-45deg);
                opacity: 1;
            }
            100% {
                transform: translate(-800px, 800px) rotate(-45deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="snowflake" style="top:15%; left:10%; animation-delay: 0s;">❄</div>
    <div class="snowflake" style="top:25%; left:75%; animation-delay: 0.3s;">❄</div>
    <div class="snowflake" style="top:45%; left:20%; animation-delay: 0.7s;">❄</div>
    <div class="snowflake" style="top:65%; left:85%; animation-delay: 1.1s;">❄</div>
    <div class="snowflake" style="top:85%; left:40%; animation-delay: 0.2s;">❄</div>
    <div class="snowflake" style="top:35%; left:55%; animation-delay: 0.9s;">❄</div>
    <div class="snowflake" style="top:75%; left:15%; animation-delay: 0.5s;">❄</div>
    <div class="snowflake" style="top:10%; left:90%; animation-delay: 1.4s;">❄</div>
    <div class="snowflake" style="top:50%; left:70%; animation-delay: 0.6s;">❄</div>

    <div id="shooting-stars-container"></div>

    <h1>👑CODE ARK 1👑</h1>

    <div class="note">
        <div class="note-content">
            <h2>CODE TELE CƠ BẢN</h2>
            <p>CODE TELE TRỤ ĐỎ❗️
            admincheat SetPlayerPos 79.75 17.99 -11000</p>
            <p>CODE TELE TRỤ XANH❗️
            admincheat SetPlayerPos 58.70 70.13 -10000</p>
            <p>CODE TELE TRỤ TRẮNG❗️</p>
        </div>
    </div>

    <script>
        const container = document.getElementById('shooting-stars-container');

        function createShootingStar() {
            const star = document.createElement('div');
            star.classList.add('shooting-star');
            
            // Tọa độ ngẫu nhiên phủ kín màn hình
            const startX = Math.random() * (window.innerWidth * 1.6) - (window.innerWidth * 0.2);
            const startY = Math.random() * (window.innerHeight * 0.8) - 120;
            
            star.style.left = `${startX}px`;
            star.style.top = `${startY}px`;
            
            const duration = Math.random() * 1.5 + 2.0; 
            star.style.animationDuration = `${duration}s`;
            
            container.appendChild(star);
            
            setTimeout(() => {
                star.remove();
            }, duration * 1000);
        }

        // Tần suất xuất hiện dày dặn (400ms tạo 1 sao)
        setInterval(createShootingStar, 400);
    </script>

</body>
</html>
