<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Website của Huy</title>
    <style>
        /* Khung viền Rainbow bao quanh toàn màn hình */
        html {
            height: 100vh;
            padding: 8px; /* Độ dày của viền cầu vồng */
            box-sizing: border-box;
            background: linear-gradient(
                45deg, 
                #ff3b30, #ff9500, #ffcc00, #4cd964, #5ac8fa, #007aff, #5856d6, #ff2d55
            );
            background-size: 400% 400%;
            animation: rainbowBorder 10s ease infinite;
        }

        body {
            margin: 0;
            overflow: hidden;
            color: white;
            /* Nền màu cam tối bí ẩn, sâu thẳm */
            background: radial-gradient(circle at center, #2c1605 0%, #0f0701 100%);
            
            /* Căn giữa nội dung */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-family: sans-serif;
            position: relative;
        }

        /* Animation cho viền cầu vồng bên ngoài */
        @keyframes rainbowBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(255, 149, 0, 0.4);
            font-size: 2.5rem;
            margin-bottom: 10px;
            z-index: 10;
        }

        p {
            font-size: 1.2rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            z-index: 10;
        }

        button {
            padding: 12px 24px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 149, 0, 0.5); /* Viền nút màu cam ánh kim */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }

        button:hover {
            background: #ff9500;
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 149, 0, 0.6);
        }

        /* Cải tiến: Ngôi sao nhỏ lấp lánh mạnh hơn nhiều */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px #fff, 0 0 12px #ff9500; /* Thêm ánh hào quang cam nhẹ */
            animation: twinkle 1.5s infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1.8); } /* Tăng độ phóng đại để thấy rõ lấp lánh */
        }

        #shooting-stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Sửa lại hướng bay sao băng chuẩn: Từ trên phải vút xuống dưới trái */
        .shooting-star {
            position: absolute;
            width: 120px;
            height: 2px;
            background: linear-gradient(-90deg, rgba(255,255,255,1), rgba(255,255,255,0));
            transform: rotate(-135deg); /* Đổi góc xoay ngược lại */
            opacity: 0;
            animation: shoot linear forwards;
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-135deg);
                opacity: 1;
            }
            100% {
                transform: translate(-600px, 600px) rotate(-135deg); /* Bay chéo sang trái và đi xuống */
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    
    <div class="star" style="top:15%; left:10%; animation-delay: 0s;"></div>
    <div class="star" style="top:25%; left:75%; animation-delay: 0.3s;"></div>
    <div class="star" style="top:45%; left:20%; animation-delay: 0.7s;"></div>
    <div class="star" style="top:65%; left:80%; animation-delay: 1.1s;"></div>
    <div class="star" style="top:85%; left:45%; animation-delay: 0.2s;"></div>
    <div class="star" style="top:35%; left:50%; animation-delay: 0.9s;"></div>
    <div class="star" style="top:75%; left:15%; animation-delay: 0.5s;"></div>
    <div class="star" style="top:10%; left:85%; animation-delay: 1.4s;"></div>

    <div id="shooting-stars-container"></div>

    <h1>Xin chào!!</h1>
    <p>Đây là website để Huy lưu trữ code</p>

    <button onclick="checkKey()">Nhấn vào đây</button>

    <script>
        const container = document.getElementById('shooting-stars-container');

        function createShootingStar() {
            const star = document.createElement('div');
            star.classList.add('shooting-star');
            
            // Tọa độ xuất phát đổi lại: Ngẫu nhiên ở góc phía trên bên PHẢI màn hình
            const startX = Math.random() * window.innerWidth * 0.5 + (window.innerWidth * 0.4);
            const startY = Math.random() * window.innerHeight * 0.3 - 50;
            
            star.style.left = `${startX}px`;
            star.style.top = `${startY}px`;
            
            const duration = Math.random() * 1.2 + 1.2; // Tốc độ vút nhanh hơn một chút nhìn sẽ thật hơn
            star.style.animationDuration = `${duration}s`;
            
            container.appendChild(star);
            
            setTimeout(() => {
                star.remove();
            }, duration * 1000);
        }

        // Cứ mỗi 1 giây thả 1 sao băng
        setInterval(createShootingStar, 1000);

        function checkKey() {
            let key = prompt("Vui lòng nhập key:");
            if (key === null) return; 

            if (key === "Huydepzai") {
                window.location.href = "note.html";
            } else {
                alert("Key không đúng!");
            }
        }
    </script>
</body>
</html>
