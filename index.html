<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Website của Huy</title>
    <style>
        html {
            height: 100vh;
            padding: 4px;
            box-sizing: border-box;
            background: linear-gradient(45deg, #ff3b30, #ff9500, #ffcc00, #4cd964, #5ac8fa, #007aff, #5856d6, #ff2d55);
            background-size: 400% 400%;
            animation: rainbowBorder 10s ease infinite;
        }
        body {
            margin: 0; overflow: hidden; color: white;
            background: radial-gradient(circle at center, #2c1605 0%, #0f0701 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100%; font-family: sans-serif; position: relative; border-radius: 16px; 
        }
        @keyframes rainbowBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 { color: #ffffff; text-shadow: 0 4px 15px rgba(255, 149, 0, 0.4); font-size: 2.5rem; margin-bottom: 10px; z-index: 10; }
        p { font-size: 1.2rem; text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5); margin-bottom: 20px; z-index: 10; }
        button {
            padding: 12px 24px; border: none; background: rgba(255, 255, 255, 0.1); color: white;
            border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 149, 0, 0.5); box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; z-index: 10;
        }
        button:hover { background: #ff9500; color: #000; transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 149, 0, 0.6); }
        .snowflake { position: absolute; color: #ffffff; font-size: 10px; user-select: none; pointer-events: none; animation: twinkleSnow 1.5s infinite alternate ease-in-out; text-shadow: 0 0 5px #fff, 0 0 10px #ff9500; }
        @keyframes twinkleSnow { 0% { opacity: 0.2; transform: scale(0.6) rotate(0deg); } 100% { opacity: 1; transform: scale(1.4) rotate(45deg); } }
        #shooting-stars-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .shooting-star { position: absolute; width: 120px; height: 2px; background: linear-gradient(to right, rgba(255,255,255,1), rgba(255,255,255,0)); transform: rotate(-45deg); opacity: 0; animation: shootDownLeft linear forwards; }
        @keyframes shootDownLeft { 0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; } 100% { transform: translate(-800px, 800px) rotate(-45deg); opacity: 0; } }
        .wheel-wrapper { margin-top: 30px; position: relative; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .wheel-container { position: relative; width: 320px; height: 320px; border-radius: 50%; border: 5px solid #ff9500; box-shadow: 0 0 20px rgba(255, 149, 0, 0.5); background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff3b30; z-index: 15; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; display: block; }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; border-radius: 50%; background: #ffffff; color: #000; font-size: 14px; font-weight: bold; border: 2px solid #ff9500; cursor: pointer; box-shadow: 0 0 10px rgba(255,149,0,0.6); display: flex; justify-content: center; align-items: center; user-select: none; z-index: 12; transition: transform 0.1s ease; }
        .spin-btn:active { transform: translate(-50%, -50%) scale(0.9); }
    </style>
</head>
<body>
    <div class="snowflake" style="top:15%; left:10%; animation-delay: 0s;">❄</div>
    <div class="snowflake" style="top:25%; left:75%; animation-delay: 0.3s;">❄</div>
    <div class="snowflake" style="top:45%; left:20%; animation-delay: 0.7s;">❄</div>
    <div class="snowflake" style="top:65%; left:85%; animation-delay: 1.1s;">❄</div>
    <div class="snowflake" style="top:85%; left:40%; animation-delay: 0.2s;">❄</div>
    <div id="shooting-stars-container"></div>

    <h1>Vòng Quay ARK</h1>
    <p>☠️20k/1 lượt quay☠️</p>
    
    <button onclick="handleLogin()">ĐĂNG NHẬP VÀO KHO CODE ARK</button>

    <div class="wheel-wrapper">
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div class="spin-btn" id="spinBtn">QUAY</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // 1. Hiệu ứng sao băng nền
        const container = document.getElementById('shooting-stars-container');
        function createShootingStar() {
            const star = document.createElement('div'); star.classList.add('shooting-star');
            const startX = Math.random() * (window.innerWidth * 1.6) - (window.innerWidth * 0.2);
            const startY = Math.random() * (window.innerHeight * 0.8) - 120;
            star.style.left = `${startX}px`; star.style.top = `${startY}px`;
            const duration = Math.random() * 1.5 + 2.0; star.style.animationDuration = `${duration}s`;
            container.appendChild(star);
            setTimeout(() => { star.remove(); }, duration * 1000);
        }
        setInterval(createShootingStar, 400);

        // 2. Cấu hình Firebase sạch sẽ
        const firebaseConfig = {
            apiKey: "AIzaSyA7veYYQmj98jxeAGpjXWSLDkyYbeAtkjA",
            authDomain: "web-huy.firebaseapp.com",
            databaseURL: "https://web-huy-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "web-huy",
            storageBucket: "web-huy.firebasestorage.app",
            messagingSenderId: "85036345936",
            appId: "1:85036345936:web:cb37629df2d02040247f55"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Biến phục vụ đếm click bí mật
        let loginClickCount = 0;
        let loginClickTimeout;

        // Hàm xử lý kích hoạt cấu hình hệ thống bí mật
        function setupWheelTarget() {
            const menu = prompt("Chọn tính năng:\n1. Cài đặt ô trúng thưởng\n2. Đổi mật khẩu lượt quay tiếp theo");
            if (!menu) return;

            if (menu === "1") {
                const input = prompt("Nhập số thứ tự ô trúng (0 là ô đầu tiên, 1 là ô thứ hai,...) hoặc gõ 'random' để quay tự nhiên:");
                if (input === null) return; 
                
                if (input.trim().toLowerCase() === 'random') {
                    database.ref('wheel_config/target').set(-1)
                    .then(() => alert("Đã chuyển về chế độ ngẫu nhiên tự nhiên!"));
                } else {
                    const targetIndex = parseInt(input);
                    if (!isNaN(targetIndex) && targetIndex >= 0) {
                        database.ref('wheel_config/target').set(targetIndex)
                        .then(() => alert(`Đã cài đặt ép trúng ô số: ${targetIndex}`));
                    } else {
                        alert("Giá trị nhập vào không hợp lệ!");
                    }
                }
            } else if (menu === "2") {
                const newCode = prompt("Nhập mật khẩu 1 lần cho lượt quay tiếp theo:");
                if (newCode) {
                    database.ref('wheel_config/spin_password').set(newCode.trim())
                    .then(() => alert(`Đã cập nhật mật khẩu lượt quay mới thành công!`));
                }
            }
        }

        // Hàm xử lý đăng nhập (Đã tích hợp kích hoạt 5 click)
        function handleLogin() {
            loginClickCount++;
            clearTimeout(loginClickTimeout);

            // Nếu click đủ 5 lần liên tiếp thật nhanh
            if (loginClickCount >= 5) {
                loginClickCount = 0;
                setupWheelTarget(); // Mở ngay bảng cấu hình gian lận
                return;
            }

            // Tạo độ trễ 500ms để chờ xem người dùng có bấm tiếp hay không
            loginClickTimeout = setTimeout(() => {
                loginClickCount = 0; // Reset đếm nếu dừng lại quá 500ms
                
                // Chạy logic Đăng nhập bình thường
                let email = prompt("Vui lòng nhập Email:"); if (!email) return;
                let password = prompt("Vui lòng nhập Mật khẩu:"); if (!password) return;
                
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        alert("🎉 Đăng nhập thành công!");
                        window.location.assign("note.html");
                    })
                    .catch((error) => {
                        console.error("Lỗi đăng nhập:", error.message);
                        alert("❌ Tài khoản hoặc mật khẩu không chính xác!\nHoặc tài khoản chưa được thêm vào mục Authentication trên Firebase Console.");
                    });
            }, 500); 
        }

        // 3. Logic Vòng quay hình học Canvas
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");

        const prizes = [
            { text: "giáp thường🤔", percent: 20, color: "#3a200a" },
            { text: "thuốc linh tinh🥸", percent: 30, color: "#57300f" },
            { text: "1k amber🥳", percent: 20, color: "#3a200a" },
            { text: "súng thường🤩", percent: 10, color: "#57300f" },
            { text: "súng xịn      👏", percent: 8, color: "#7a4315" },
            { text: "1 cặp thú + bv snip", percent: 2, color: "#d47a00" },
            { text: "set tek max + armor", percent: 2, color: "#d47a00" },
            { text: "1 thú alpha👑", percent: 8, color: "#57300f" }
        ];
        const numPrizes = prizes.length;
        const arcSize = (2 * Math.PI) / numPrizes;
        let currentRotation = 0; 
        let isSpinning = false;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const size = canvas.width / 2;
            for (let i = 0; i < numPrizes; i++) {
                const angle = currentRotation + (i * arcSize);
                ctx.fillStyle = prizes[i].color;
                ctx.beginPath(); ctx.moveTo(size, size);
                ctx.arc(size, size, size - 15, angle, angle + arcSize, false);
                ctx.lineTo(size, size); ctx.fill();
                ctx.strokeStyle = "rgba(255, 149, 0, 0.4)"; ctx.lineWidth = 3; ctx.stroke();
                ctx.save(); ctx.fillStyle = "#ffffff"; ctx.font = "bold 22px sans-serif";
                ctx.translate(size, size); ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right"; ctx.fillText(prizes[i].text, size - 40, 8); ctx.restore();
            }
        }

        function getWinningIndexByPercent() {
            let totalPercent = prizes.reduce((sum, item) => sum + (item.percent || 0), 0);
            let rand = Math.random() * totalPercent; 
            let cumulativePercent = 0;
            
            for (let i = 0; i < prizes.length; i++) {
                cumulativePercent += (prizes[i].percent || 0);
                if (rand <= cumulativePercent) {
                    return i;
                }
            }
            return Math.floor(Math.random() * prizes.length);
        }

        function runWheelAnimation(winningIndex) {
            const randomOffset = (Math.random() * 0.6 + 0.2) * arcSize;
            const targetAngleInWheel = (winningIndex * arcSize) + randomOffset;
            const baseRotationNeeded = (1.5 * Math.PI) - targetAngleInWheel;
            const currentFullRounds = Math.ceil(currentRotation / (2 * Math.PI)) * 2 * Math.PI;
            const finalRotation = currentFullRounds + baseRotationNeeded + ((Math.floor(Math.random() * 3) + 6) * 2 * Math.PI);
            const initialRotationState = currentRotation;
            let startTimestamp = null;

            function animateWheel(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                const elapsed = timestamp - startTimestamp;
                const progress = Math.min(elapsed / 4000, 1);
                
                currentRotation = initialRotationState + (finalRotation - initialRotationState) * (1 - Math.pow(1 - progress, 3));
                drawWheel();
                
                if (progress < 1) { 
                    requestAnimationFrame(animateWheel); 
                } else { 
                    isSpinning = false; 
                    setTimeout(() => alert(`🎉 Chúc mừng bạn đã quay trúng: ${prizes[winningIndex].text}`), 200); 
                }
            }
            requestAnimationFrame(animateWheel);
        }

        // Sự kiện click nút QUAY kiểm tra mật khẩu 1 lần
        spinBtn.addEventListener("click", () => {
            if (isSpinning) return;

            // 1. Lấy mật khẩu một lần hiện tại từ Firebase Realtime Database
            database.ref('wheel_config/spin_password').once('value').then((snapshot) => {
                const correctPassword = snapshot.val();

                // Nếu admin chưa tạo mật khẩu nào hoặc mật khẩu trống, thông báo yêu cầu liên hệ Admin
                if (!correctPassword || correctPassword.toString().startsWith("USED_")) {
                    alert("❌ Lượt quay này chưa được kích hoạt mật khẩu. Vui lòng liên hệ Admin!");
                    return;
                }

                // 2. Yêu cầu khách hàng nhập mã lượt quay công khai
                const userPassword = prompt("Vui lòng nhập mật khẩu lượt quay của bạn (Mật khẩu dùng 1 lần):");
                if (!userPassword) return;

                if (userPassword.trim() === correctPassword.toString().trim()) {
                    // Mật khẩu đúng -> Ngay lập tức hủy/xóa mật khẩu này để không thể sử dụng lại lần 2
                    database.ref('wheel_config/spin_password').set("USED_AT_" + Date.now())
                    .then(() => {
                        // Khóa trạng thái quay và bắt đầu xử lý vòng quay
                        isSpinning = true;
                        processWheelSpin();
                    });
                } else {
                    alert("❌ Mật khẩu lượt quay không chính xác hoặc đã được sử dụng trước đó!");
                }
            }).catch((err) => {
                alert("❌ Lỗi kiểm tra bảo mật hệ thống!");
                console.error(err);
            });
        });

        // Hàm phụ trách lấy cấu hình ô trúng thưởng và kích hoạt hiệu ứng xoay
        function processWheelSpin() {
            // Đọc cấu hình kết quả chỉ định từ Firebase Realtime Database
            database.ref('wheel_config/target').once('value').then((snapshot) => {
                let val = snapshot.val();
                let winningIndex = parseInt(val, 10);
                
                // Nếu dữ liệu trên Firebase không hợp lệ hoặc trống, tự động tính toán theo tỷ lệ phần trăm cài sẵn
                if (isNaN(winningIndex) || winningIndex < 0 || winningIndex >= prizes.length) {
                    winningIndex = getWinningIndexByPercent();
                }
                runWheelAnimation(winningIndex);
            }).catch((err) => {
                // CHẾ ĐỘ DỰ PHÒNG: Khi mất kết nối Firebase hoặc lỗi phân quyền Rules, chuyển ngay sang quay theo tỷ lệ phần trăm
                console.warn("Mất kết nối Firebase. Chuyển sang chế độ quay theo tỉ lệ % đã cài đặt trước.", err);
                let backupWinningIndex = getWinningIndexByPercent();
                runWheelAnimation(backupWinningIndex);
            });
        }
        
        drawWheel();
    </script>
</body>
</html>
