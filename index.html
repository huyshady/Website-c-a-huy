<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Website của Huy</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            color: white;
            /* Nền cầu vồng dải màu mịn và mượt hơn */
            background: linear-gradient(
                45deg, 
                #ff3b30, #ff9500, #ffcc00, #4cd964, #5ac8fa, #007aff, #5856d6, #ff2d55
            );
            background-size: 600% 600%;
            animation: rainbow 20s ease infinite; /* Chậm lại 20s để tạo hiệu ứng mượt mà */
            
            /* Căn giữa nội dung */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            position: relative;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            font-size: 2.5rem;
            margin-bottom: 10px;
            z-index: 10;
        }

        p {
            font-size: 1.2rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            z-index: 10;
        }

        button {
            padding: 12px 24px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 30px; /* Bo tròn viền dạng viên thuốc hiện đại */
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px); /* Hiệu ứng kính mờ cho nút bấm */
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 10;
        }

        button:hover {
            background: white;
            color: #333;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255,255,255,0.4);
        }

        /* Thống nhất ngôi sao tĩnh */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.5); }
        }

        /* Container chứa sao băng sinh ra ngẫu nhiên */
        #shooting-stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Không cản trở việc click nút */
        }

        /* CSS mẫu cho sao băng */
        .shooting-star {
            position: absolute;
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,1), rgba(255,255,255,0));
            transform: rotate(-35deg);
            opacity: 0;
            animation: shoot linear forwards;
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-35deg);
                opacity: 1;
            }
            100% {
                transform: translate(600px, 420px) rotate(-35deg); /* Bay chéo từ góc trên trái xuống dưới phải */
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    
    <div class="star" style="top:15%; left:10%;"></div>
    <div class="star" style="top:25%; left:75%;"></div>
    <div class="star" style="top:45%; left:20%;"></div>
    <div class="star" style="top:65%; left:80%;"></div>
    <div class="star" style="top:85%; left:45%;"></div>
    <div class="star" style="top:35%; left:50%;"></div>
    <div class="star" style="top:75%; left:15%;"></div>

    <div id="shooting-stars-container"></div>

    <h1>Xin chào!!</h1>
    <p>Đây là website để Huy lưu trữ code</p>

    <button onclick="checkKey()">Nhấn vào đây</button>

    <script>
        // TỰ ĐỘNG TẠO SAO BĂNG RƠI LIÊN TỤC VỚI VỊ TRÍ NGẪU NHIÊN
        const container = document.getElementById('shooting-stars-container');

        function createShootingStar() {
            const star = document.createElement('div');
            star.classList.add('shooting-star');
            
            // Random điểm xuất phát ngẫu nhiên ở phía trên và bên trái màn hình
            const startX = Math.random() * window.innerWidth * 0.8 - 100;
            const startY = Math.random() * window.innerHeight * 0.4 - 150;
            
            star.style.left = `${startX}px`;
            star.style.top = `${startY}px`;
            
            // Random thời gian bay (từ 1.5 giây đến 3 giây) giúp nhịp rơi tự nhiên hơn
            const duration = Math.random() * 1.5 + 1.5;
            star.style.animationDuration = `${duration}s`;
            
            container.appendChild(star);
            
            // Xóa sao băng sau khi bay xong để tránh tràn bộ nhớ
            setTimeout(() => {
                star.remove();
            }, duration * 1000);
        }

        // Cứ mỗi 1.2 giây sẽ tự động thả một ngôi sao băng mới
        setInterval(createShootingStar, 1200);

        // Giữ nguyên logic checkKey tối ưu của bạn
        function checkKey() {
            let key = prompt("Vui lòng nhập key:");

            if (key === null) return; 

            if (key === "Huydepzai") {
                window.location.href = "note.html";
            } else {
                alert("Key không đúng!");
            }
        }
    </script>
</body>
</html>
