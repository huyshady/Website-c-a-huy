<button onclick="checkKey()">
Nhấn vào đây
</button>

<script>
function checkKey() {
    let key = prompt("Vui lòng nhập key:");

    if (key === "Huydepzai") {
        window.location.href = "note.html";
    } else {
        alert("Key không đúng!");
    }
}
</script>
